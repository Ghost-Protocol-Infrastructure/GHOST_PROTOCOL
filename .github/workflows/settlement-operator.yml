name: Settlement Operator

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to call (defaults to production)"
        required: false
        default: "https://www.ghostprotocol.cc"
        type: string
      max_batch_size:
        description: "Optional max merchant earnings to allocate this run"
        required: false
        default: "20"
        type: string
      reconcile_limit:
        description: "Optional max submitted settlement rows to reconcile this run"
        required: false
        default: "100"
        type: string
  schedule:
    # GitHub Actions scheduled workflows are best-effort and support a minimum
    # interval of once every 5 minutes. Offset away from the top of the hour
    # to reduce delay during common high-load windows.
    - cron: "4-59/5 * * * *"

permissions:
  contents: read

concurrency:
  group: settlement-operator
  cancel-in-progress: false

jobs:
  settlement-operator:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run settlement reconcile and allocate
        env:
          SETTLEMENT_SECRET: ${{ secrets.GHOST_SETTLEMENT_OPERATOR_SECRET }}
          EXPIRE_SWEEP_SECRET: ${{ secrets.GHOST_FULFILLMENT_EXPIRE_SWEEP_SECRET }}
          BASE_URL_INPUT: ${{ github.event.inputs.base_url }}
          MAX_BATCH_SIZE_INPUT: ${{ github.event.inputs.max_batch_size }}
          RECONCILE_LIMIT_INPUT: ${{ github.event.inputs.reconcile_limit }}
        run: |
          set -euo pipefail

          secrets=()
          secret_labels=()

          if [ -n "${SETTLEMENT_SECRET:-}" ]; then
            secrets+=("${SETTLEMENT_SECRET}")
            secret_labels+=("GHOST_SETTLEMENT_OPERATOR_SECRET")
          fi

          if [ -n "${EXPIRE_SWEEP_SECRET:-}" ] && [ "${EXPIRE_SWEEP_SECRET}" != "${SETTLEMENT_SECRET:-}" ]; then
            secrets+=("${EXPIRE_SWEEP_SECRET}")
            secret_labels+=("GHOST_FULFILLMENT_EXPIRE_SWEEP_SECRET")
          fi

          if [ "${#secrets[@]}" -eq 0 ]; then
            echo "Missing repo secret GHOST_SETTLEMENT_OPERATOR_SECRET (or fallback GHOST_FULFILLMENT_EXPIRE_SWEEP_SECRET)" >&2
            exit 1
          fi

          base_url="${BASE_URL_INPUT:-https://www.ghostprotocol.cc}"
          base_url="${base_url%/}"
          if [ "${base_url}" = "https://ghostprotocol.cc" ]; then
            base_url="https://www.ghostprotocol.cc"
          fi

          max_batch_size="${MAX_BATCH_SIZE_INPUT:-20}"
          reconcile_limit="${RECONCILE_LIMIT_INPUT:-100}"

          reconcile_url="${base_url}/api/admin/settlement/reconcile?limit=${reconcile_limit}"
          allocate_url="${base_url}/api/admin/settlement/allocate?maxBatchSize=${max_batch_size}"

          call_with_operator_secret() {
            local method="$1"
            local url="$2"
            local response_file="$3"
            local http_code=""

            for i in "${!secrets[@]}"; do
              local secret="${secrets[$i]}"
              local label="${secret_labels[$i]}"

              echo "Attempting ${method} ${url} using ${label}"
              http_code="$(curl -sS -o "${response_file}" -w '%{http_code}' \
                -X "${method}" \
                -H "Authorization: Bearer ${secret}" \
                -H "Accept: application/json" \
                "${url}")"

              cat "${response_file}"
              echo

              if [ "${http_code}" = "200" ]; then
                if [ "${i}" -gt 0 ]; then
                  echo "Succeeded using fallback secret ${label}"
                fi
                return 0
              fi

              if [ "${http_code}" != "401" ]; then
                echo "Endpoint failed with HTTP ${http_code}" >&2
                return 1
              fi
            done

            echo "All configured operator secrets were rejected with HTTP 401" >&2
            return 1
          }

          echo "Reconciling submitted settlements via ${reconcile_url}"
          if ! call_with_operator_secret POST "${reconcile_url}" reconcile-response.json; then
            echo "Settlement reconcile endpoint failed" >&2
            exit 1
          fi

          echo "Allocating pending settlements via ${allocate_url}"
          if ! call_with_operator_secret POST "${allocate_url}" allocate-response.json; then
            echo "Settlement allocate endpoint failed" >&2
            exit 1
          fi
