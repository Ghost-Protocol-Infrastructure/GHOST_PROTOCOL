name: Publish Node SDK

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
  push:
    tags:
      - "sdk-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Upgrade npm CLI for trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Validate tag version matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="${GITHUB_REF_NAME#sdk-v}"
          actual="$(node -p "require('./packages/sdk/package.json').version")"
          if [ "$expected" != "$actual" ]; then
            echo "Tag version ($expected) does not match packages/sdk version ($actual)."
            exit 1
          fi

      - name: Publish to npm (trusted publishing)
        working-directory: packages/sdk
        env:
          NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.npm_tag || 'latest' }}
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          unset NODE_AUTH_TOKEN
          npm publish --access public --provenance --tag "$NPM_DIST_TAG"
